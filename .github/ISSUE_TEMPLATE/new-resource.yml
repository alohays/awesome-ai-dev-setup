name: New Resource Suggestion
description: Suggest a new tool, template, or config to add to the list
title: "[New Resource] "
labels: ["new-resource"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new resource! Please fill out the form below.
        Make sure the project meets the [contribution guidelines](../../CONTRIBUTING.md) before submitting.

  - type: input
    id: project-name
    attributes:
      label: Project Name
      description: The name of the tool, template, or config
      placeholder: e.g., awesome-tool
    validations:
      required: true

  - type: input
    id: github-url
    attributes:
      label: GitHub URL
      description: The full GitHub repository URL
      placeholder: https://github.com/owner/repo
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which section of the list does this belong to?
      options:
        - AI Coding Assistants
        - IDE Extensions & Plugins
        - Prompt Engineering
        - Agent Frameworks
        - MCP Servers
        - Templates & Configs
        - Workflows & Automation
        - Other
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: One-line Description
      description: A concise description under 100 characters
      placeholder: "Brief description of what this tool does"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Recommendation
      description: Why should this be included? What makes it valuable for AI-assisted development?
      placeholder: Explain why this resource is worth adding to the list...
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: The project is actively maintained (recent commits within 12 months)
          required: true
        - label: The project is relevant to AI-assisted development
          required: true
        - label: The description is under 100 characters
          required: true
        - label: I have checked that this resource is not already in the list
          required: true
