name: Project Health Check

on:
  schedule:
    - cron: "0 0 1 * *" # First day of every month at midnight UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check project health
        id: health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPORT_FILE="health-report.md"
          STALE_THRESHOLD_DAYS=365
          CUTOFF_DATE=$(date -d "-${STALE_THRESHOLD_DAYS} days" -u +%Y-%m-%dT%H:%M:%SZ)
          ISSUES_FOUND=false

          echo "# Project Health Report" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "Generated on $(date -u +%Y-%m-%d)" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "| Repository | Status | Last Push | Notes |" >> "$REPORT_FILE"
          echo "|------------|--------|-----------|-------|" >> "$REPORT_FILE"

          REPOS=$(grep -oE 'github\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+' README.md \
            | sed 's|github.com/||' \
            | sort -u)

          for REPO in $REPOS; do
            RESPONSE=$(gh api "repos/${REPO}" 2>&1) || {
              echo "| ${REPO} | :x: **NOT FOUND** | N/A | Repository may be deleted or renamed |" >> "$REPORT_FILE"
              ISSUES_FOUND=true
              continue
            }

            ARCHIVED=$(echo "$RESPONSE" | jq -r '.archived')
            PUSHED_AT=$(echo "$RESPONSE" | jq -r '.pushed_at')

            if [ "$ARCHIVED" = "true" ]; then
              echo "| ${REPO} | :warning: **ARCHIVED** | ${PUSHED_AT} | Repository has been archived |" >> "$REPORT_FILE"
              ISSUES_FOUND=true
              continue
            fi

            if [[ "$PUSHED_AT" < "$CUTOFF_DATE" ]]; then
              echo "| ${REPO} | :hourglass: **STALE** | ${PUSHED_AT} | No commits in 12+ months |" >> "$REPORT_FILE"
              ISSUES_FOUND=true
              continue
            fi

            echo "| ${REPO} | :white_check_mark: Active | ${PUSHED_AT} | |" >> "$REPORT_FILE"
          done

          echo "" >> "$REPORT_FILE"
          echo "---" >> "$REPORT_FILE"
          echo "*Stale threshold: ${STALE_THRESHOLD_DAYS} days. Generated by [project-health workflow](https://github.com/${{ github.repository }}/actions/workflows/project-health.yml).*" >> "$REPORT_FILE"

          echo "issues_found=${ISSUES_FOUND}" >> "$GITHUB_OUTPUT"

      - name: Create issue from health report
        if: steps.health.outputs.issues_found == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Project Health Report: Stale or inactive projects detected"
          content-filepath: ./health-report.md
          labels: link-rot,health-check
